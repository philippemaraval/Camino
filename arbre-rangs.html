<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camino - Arbre de progression des rangs</title>
  <meta name="description" content="Visualisez votre progression vers le rang global suivant dans Camino.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Montserrat:wght@600;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand-sea-950: #0c1d57;
      --brand-sea-900: #12297a;
      --brand-sea-700: #2d4caa;
      --brand-sun-500: #f2a900;
      --text-primary: #1e293b;
      --text-secondary: #5f6f84;
      --text-muted: #76879f;
      --border: rgba(18, 41, 122, 0.14);
      --shadow: 0 18px 32px rgba(12, 29, 87, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Nunito", system-ui, sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(1200px 520px at 10% -10%, rgba(242, 169, 0, 0.14), transparent 60%),
        radial-gradient(1100px 420px at 100% 0%, rgba(64, 87, 178, 0.18), transparent 62%),
        linear-gradient(135deg, #fefbf5 0%, #eef3ff 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 18px 42px;
    }

    .hero {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(245, 249, 255, 0.94));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 14px;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      color: var(--brand-sea-900);
      border: 1px solid rgba(18, 41, 122, 0.28);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.72);
    }

    h1 {
      margin: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      font-size: clamp(26px, 4.2vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--brand-sea-950);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 72ch;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 22px rgba(12, 29, 87, 0.08);
      padding: 12px;
    }

    .overview {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .overview-count {
      display: inline-flex;
      align-items: center;
      min-width: 70px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      font-weight: 800;
      color: var(--brand-sea-950);
    }

    .overview-label {
      display: inline-flex;
      align-items: center;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.045em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .overview-bar {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.12);
      overflow: hidden;
    }

    .overview-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2d4caa 0%, #23895d 100%);
    }

    .tree {
      width: 100%;
    }

    .tree-shell {
      display: grid;
      grid-template-columns: minmax(86px, 116px) 1fr;
      gap: 10px;
      align-items: start;
    }

    .tree-current-wrap {
      position: relative;
      padding-top: 54px;
    }

    .tree-current-wrap::after {
      content: "";
      position: absolute;
      right: -10px;
      top: 70px;
      width: 10px;
      height: 2px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.2);
    }

    .rank-node {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      box-shadow: 0 3px 10px rgba(18, 41, 122, 0.08);
    }

    .rank-node--current {
      color: var(--brand-sea-900);
      border-color: rgba(18, 41, 122, 0.24);
    }

    .rank-node--next {
      color: #12502f;
      border-color: rgba(36, 121, 69, 0.3);
      background: rgba(237, 250, 240, 0.96);
    }

    .tree-main-wrap {
      min-width: 0;
    }

    .tree-next-row {
      margin-left: 16px;
      margin-bottom: 8px;
      max-width: 220px;
    }

    .tree-branches {
      position: relative;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tree-branches::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.2);
    }

    .branch-row {
      position: relative;
    }

    .branch-row::before {
      content: "";
      position: absolute;
      left: -15px;
      top: 17px;
      width: 15px;
      height: 2px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.2);
    }

    .zone-box {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.92);
    }

    .zone-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
    }

    .zone-title {
      margin: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      font-size: 12px;
      color: var(--brand-sea-950);
      line-height: 1.2;
    }

    .zone-count {
      font-size: 10px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      color: var(--text-secondary);
    }

    .mode-mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
    }

    .mode-mini {
      border: 1px solid rgba(18, 41, 122, 0.16);
      border-radius: 7px;
      padding: 4px;
      background: rgba(245, 248, 255, 0.9);
    }

    .mode-mini.done {
      background: rgba(233, 250, 238, 0.95);
      border-color: rgba(38, 131, 77, 0.36);
    }

    .mode-mini.pending {
      background: rgba(255, 247, 231, 0.95);
      border-color: rgba(172, 114, 31, 0.35);
    }

    .mode-mini.new {
      background: rgba(243, 247, 251, 0.95);
      border-color: rgba(101, 121, 149, 0.26);
    }

    .mode-mini-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 2px;
    }

    .mode-mini-tag {
      font-size: 9px;
      font-weight: 800;
      color: var(--brand-sea-950);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .mode-mini-state {
      font-size: 8px;
      color: var(--text-secondary);
    }

    .mode-mini-score {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 9px;
      font-weight: 700;
      color: var(--brand-sea-950);
    }

    .mode-mini-miss {
      margin-top: 1px;
      font-size: 8px;
      color: var(--text-muted);
      min-height: 10px;
    }

    .mode-mini-bar {
      margin-top: 2px;
      height: 3px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.1);
      overflow: hidden;
    }

    .mode-mini-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2f67cf 0%, #23895d 100%);
    }

    .status-box {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.88);
      padding: 12px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .status-box a {
      color: var(--brand-sea-900);
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .page {
        padding: 14px 12px 28px;
      }

      .hero,
      .panel {
        padding: 10px;
      }

      .overview {
        flex-wrap: wrap;
      }

      .tree-shell {
        grid-template-columns: 1fr;
      }

      .tree-current-wrap {
        padding-top: 0;
      }

      .tree-current-wrap::after {
        display: none;
      }

      .tree-next-row {
        margin-left: 0;
      }

      .tree-branches {
        padding-left: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <a class="back-link" href="/">← Retour au jeu</a>
      </div>
      <h1>Arbre de progression des rangs</h1>
      <p id="subtitle" class="subtitle">Chargement de votre progression…</p>
    </header>

    <section class="panel">
      <div id="status-box" class="status-box">Chargement…</div>
      <div id="progress-root" class="hidden">
        <div class="overview">
          <span id="overview-count" class="overview-count">0/0</span>
          <span class="overview-label">conditions validées</span>
          <div class="overview-bar"><span id="overview-bar-fill" style="width:0%"></span></div>
        </div>
        <div id="tree" class="tree"></div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const USER_STORAGE_KEY = "camino_user";
      const API_URL =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1" ||
        window.location.protocol === "file:"
          ? "http://localhost:3000"
          : "https://camino2.onrender.com";

      const TITLE_THRESHOLDS_BY_MODE = {
        classique: {
          "rues-celebres": { M: 60, H: 100, V: 140, MV: 180 },
          "quartiers-ville": { M: 60, H: 100, V: 140, MV: 180 },
          "rues-principales": { M: 50, H: 90, V: 130, MV: 170 },
          quartier: { M: 40, H: 80, V: 120, MV: 160 },
          monuments: { M: 40, H: 80, V: 120, MV: 160 },
        },
        marathon: {
          "rues-celebres": { M: 10, H: 20, V: 35, MV: 55 },
          "quartiers-ville": { M: 10, H: 20, V: 35, MV: 55 },
          "rues-principales": { M: 9, H: 18, V: 30, MV: 48 },
          monuments: { M: 9, H: 18, V: 30, MV: 46 },
        },
        chrono: {
          "rues-celebres": { M: 7, H: 11, V: 16, MV: 22 },
          "quartiers-ville": { M: 7, H: 11, V: 16, MV: 22 },
          "rues-principales": { M: 6, H: 10, V: 14, MV: 19 },
          quartier: { M: 5, H: 8, V: 12, MV: 16 },
          monuments: { M: 5, H: 8, V: 12, MV: 16 },
        },
      };

      const GAME_TYPES = ["classique", "marathon", "chrono"];
      const ZONES = ["rues-celebres", "rues-principales", "quartier", "monuments", "quartiers-ville"];

      const GAME_LABELS = {
        classique: "Classique",
        marathon: "Marathon",
        chrono: "Chrono",
      };

      const ZONE_LABELS = {
        "rues-celebres": "Rues célèbres",
        "rues-principales": "Rues principales",
        quartier: "Rues par quartier",
        monuments: "Monuments",
        "quartiers-ville": "Quartiers de la ville",
      };

      const RANK_FLOW = [
        { letter: null, label: "🧳 Touriste" },
        { letter: "M", label: "🧒 Minot" },
        { letter: "H", label: "⚓ Habitué du Vieux-Port" },
        { letter: "V", label: "💪 Vrai Marseillais" },
        { letter: "MV", label: "🏛️ Maire de la Ville" },
      ];

      function toNumber(value, fallback = 0) {
        const parsed = Number.parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function buildQuartierMarathonThresholds(maxItems) {
        const total = Math.max(1, parseInt(maxItems, 10) || 55);
        const minot = Math.min(total, Math.max(1, Math.ceil(0.1 * total)));
        const habitue = Math.min(total, Math.max(minot + 1, Math.ceil(0.2 * total)));
        const vrai = Math.min(total, Math.max(habitue + 1, Math.ceil(0.35 * total)));
        const maire = Math.min(total, Math.max(vrai + 1, Math.ceil(0.55 * total)));
        return { M: minot, H: habitue, V: vrai, MV: maire };
      }

      function getTitleThresholds(mode, gameType, maxItems) {
        const modeThresholds = TITLE_THRESHOLDS_BY_MODE[gameType] || TITLE_THRESHOLDS_BY_MODE.classique;
        if (gameType === "marathon" && mode === "quartier") {
          return buildQuartierMarathonThresholds(maxItems);
        }
        return modeThresholds[mode] || modeThresholds.quartier || TITLE_THRESHOLDS_BY_MODE.classique[mode];
      }

      function getTitleScoreValue(highScore, bestItemsCorrect, gameType) {
        if (gameType === "classique") {
          return toNumber(highScore, 0);
        }
        const parsedItems = Number.parseFloat(bestItemsCorrect);
        return Number.isFinite(parsedItems) ? parsedItems : toNumber(highScore, 0);
      }

      function buildComboMap(profile) {
        const map = new Map();
        const rows = Array.isArray(profile?.modes) ? profile.modes : [];
        rows.forEach((row) => {
          if (!row || !GAME_TYPES.includes(row.game_type) || !ZONES.includes(row.mode)) {
            return;
          }
          map.set(`${row.mode}|${row.game_type}`, row);
        });
        return map;
      }

      function hasReachedGlobalRank(profile, rankLetter) {
        const combos = buildComboMap(profile);
        return GAME_TYPES.every((gameType) =>
          ZONES.every((zoneMode) => {
            const combo = combos.get(`${zoneMode}|${gameType}`);
            if (!combo) {
              return false;
            }
            const thresholds = getTitleThresholds(zoneMode, gameType, combo.best_items_total || 0);
            const scoreValue = getTitleScoreValue(combo.high_score, combo.best_items_correct, gameType);
            return typeof thresholds?.[rankLetter] === "number" && scoreValue >= thresholds[rankLetter];
          }),
        );
      }

      function getCurrentRankLevel(profile) {
        if (hasReachedGlobalRank(profile, "MV")) {
          return 4;
        }
        if (hasReachedGlobalRank(profile, "V")) {
          return 3;
        }
        if (hasReachedGlobalRank(profile, "H")) {
          return 2;
        }
        if (hasReachedGlobalRank(profile, "M")) {
          return 1;
        }
        return 0;
      }

      function getDisplayValue(value, gameType) {
        const safeValue = toNumber(value, 0);
        return gameType === "classique" ? safeValue.toFixed(1) : String(Math.round(safeValue));
      }

      function computeProgress(profile, nextRankLetter) {
        const combos = buildComboMap(profile);
        let doneTotal = 0;
        const zones = ZONES.map((zoneMode) => {
          let zoneDone = 0;
          const modes = GAME_TYPES.map((gameType) => {
            const row = combos.get(`${zoneMode}|${gameType}`);
            const thresholds = getTitleThresholds(zoneMode, gameType, row?.best_items_total || 0);
            const target = thresholds[nextRankLetter];
            const currentValue = getTitleScoreValue(row?.high_score, row?.best_items_correct, gameType);
            const reached = !!row && currentValue >= target;
            if (reached) {
              zoneDone += 1;
              doneTotal += 1;
            }
            const missing = Math.max(0, target - currentValue);
            const progressPct = target > 0 ? Math.max(0, Math.min(100, (currentValue / target) * 100)) : 0;
            return {
              gameType,
              gameLabel: GAME_LABELS[gameType] || gameType,
              rowExists: !!row,
              reached,
              currentDisplay: getDisplayValue(currentValue, gameType),
              targetDisplay: getDisplayValue(target, gameType),
              missingDisplay: getDisplayValue(missing, gameType),
              metricLabel: gameType === "classique" ? "score" : "bonnes réponses",
              progressPct,
            };
          });

          return {
            zoneMode,
            zoneLabel: ZONE_LABELS[zoneMode] || zoneMode,
            zoneDone,
            zoneTotal: GAME_TYPES.length,
            modes,
          };
        });

        return {
          zones,
          doneTotal,
          total: ZONES.length * GAME_TYPES.length,
        };
      }

      function setLoading(text) {
        document.getElementById("status-box").textContent = text;
      }

      function renderDisconnected() {
        const status = document.getElementById("status-box");
        status.innerHTML = `
          Connecte-toi d'abord dans Camino pour voir ton arbre de progression.<br>
          Ensuite, reviens ici depuis ton profil.<br><br>
          <a href="/">Aller à la page du jeu</a>`;
      }

      function renderError(message) {
        const status = document.getElementById("status-box");
        status.innerHTML = `Impossible de charger le profil.<br><strong>${escapeHtml(message)}</strong>`;
      }

      function renderTree(profile) {
        const statusBox = document.getElementById("status-box");
        const root = document.getElementById("progress-root");
        const tree = document.getElementById("tree");
        const subtitle = document.getElementById("subtitle");

        const level = getCurrentRankLevel(profile);
        const currentRank = RANK_FLOW[level];
        const nextRank = RANK_FLOW[level + 1] || null;

        subtitle.textContent = `${profile.username || "Joueur"} · format compact de l'arbre vers le rang supérieur.`;

        if (!nextRank) {
          tree.innerHTML = `
            <div class="tree-shell">
              <div class="tree-current-wrap">
                <div class="rank-node rank-node--current">${escapeHtml(currentRank.label)}</div>
              </div>
              <div class="tree-main-wrap">
                <div class="tree-next-row">
                  <div class="rank-node rank-node--next">Rang maximum atteint</div>
                </div>
              </div>
            </div>`;
          statusBox.innerHTML = "Tu as déjà atteint le plus haut rang global.";
          statusBox.classList.remove("hidden");
          root.classList.remove("hidden");
          return;
        }

        const progress = computeProgress(profile, nextRank.letter);
        const pct = progress.total > 0 ? Math.round((progress.doneTotal / progress.total) * 100) : 0;

        document.getElementById("overview-count").textContent = `${progress.doneTotal}/${progress.total}`;
        document.getElementById("overview-bar-fill").style.width = `${pct}%`;

        const zonesHtml = progress.zones.map((zone) => {
          const modesHtml = zone.modes.map((mode) => {
            const cardClass = mode.reached ? "done" : mode.rowExists ? "pending" : "new";
            const tag = mode.gameType === "classique" ? "C" : mode.gameType === "marathon" ? "M" : "Ch";
            const stateLabel = mode.reached ? "✓" : mode.rowExists ? "!" : "·";
            const secondary = mode.reached ? "OK" : mode.rowExists ? `-${mode.missingDisplay}` : "Nouveau";

            return `
              <article class="mode-mini ${cardClass}">
                <div class="mode-mini-head">
                  <span class="mode-mini-tag">${tag}</span>
                  <span class="mode-mini-state">${stateLabel}</span>
                </div>
                <div class="mode-mini-score">${mode.currentDisplay}/${mode.targetDisplay}</div>
                <div class="mode-mini-miss">${secondary}</div>
                <div class="mode-mini-bar"><span style="width:${mode.progressPct.toFixed(0)}%"></span></div>
              </article>`;
          }).join("");

          return `
            <section class="branch-row">
              <div class="zone-box">
                <div class="zone-head">
                  <h3 class="zone-title">${escapeHtml(zone.zoneLabel)}</h3>
                  <span class="zone-count">${zone.zoneDone}/${zone.zoneTotal}</span>
                </div>
                <div class="mode-mini-grid">${modesHtml}</div>
              </div>
            </section>`;
        }).join("");

        tree.innerHTML = `
          <div class="tree-shell">
            <div class="tree-current-wrap">
              <div class="rank-node rank-node--current">${escapeHtml(currentRank.label)}</div>
            </div>
            <div class="tree-main-wrap">
              <div class="tree-next-row">
                <div class="rank-node rank-node--next">${escapeHtml(nextRank.label)}</div>
              </div>
              <div class="tree-branches">${zonesHtml}</div>
            </div>
          </div>`;
        statusBox.classList.add("hidden");
        root.classList.remove("hidden");
      }

      async function loadProfileAndRender() {
        setLoading("Chargement du profil…");

        let currentUser = null;
        try {
          currentUser = JSON.parse(window.localStorage.getItem(USER_STORAGE_KEY) || "null");
        } catch (_error) {
          currentUser = null;
        }

        if (!currentUser || !currentUser.token) {
          renderDisconnected();
          return;
        }

        try {
          const response = await fetch(`${API_URL}/api/profile`, {
            headers: { Authorization: `Bearer ${currentUser.token}` },
          });

          let payload = null;
          try {
            payload = await response.json();
          } catch (_error) {
            payload = null;
          }

          if (!response.ok) {
            const reason = payload?.error || `HTTP ${response.status}`;
            renderError(reason);
            return;
          }

          renderTree(payload || {});
        } catch (error) {
          renderError(error?.message || "Erreur réseau");
        }
      }

      loadProfileAndRender();
    })();
  </script>
</body>

</html>
