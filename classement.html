<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camino - Classement</title>
  <meta name="description" content="Classement Camino : podium et liste complète des meilleurs scores par zone et mode.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Montserrat:wght@600;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260320p3">
</head>

<body class="meta-page-body">
  <main class="meta-shell">
    <header class="meta-topbar">
      <a class="meta-back-link" href="/">← Retour au jeu</a>
      <nav class="meta-nav" aria-label="Navigation">
        <a class="meta-nav-link" href="/">Jeu</a>
        <a class="meta-nav-link" href="/profil.html">Profil</a>
        <a class="meta-nav-link is-active" href="/classement.html">Classement</a>
        <a class="meta-nav-link" href="/daily-resultats.html">Daily</a>
        <a class="meta-nav-link" href="/regles.html">Règles</a>
      </nav>
    </header>

    <section class="meta-hero">
      <h1 class="meta-title">Classement Camino</h1>
      <p class="meta-subtitle">Sélectionnez la zone et le type de partie pour afficher le podium et le classement détaillé.</p>
    </section>

    <section class="meta-card" aria-label="Filtres classement">
      <h2 class="meta-card-title">Filtres</h2>
      <div class="meta-controls-row" id="period-controls">
        <button type="button" class="meta-filter-btn is-active" data-period="all">All-time</button>
        <button type="button" class="meta-filter-btn" data-period="month">Mensuel</button>
      </div>
      <div class="meta-grid meta-grid--three">
        <div>
          <label for="zone-select" class="meta-inline-note">Zone de jeu</label>
          <select id="zone-select" class="meta-select" aria-label="Sélectionner la zone"></select>
        </div>
        <div>
          <label for="game-select" class="meta-inline-note">Type de partie</label>
          <select id="game-select" class="meta-select" aria-label="Sélectionner le mode"></select>
        </div>
        <div id="quartier-select-wrap" class="hidden">
          <label for="quartier-select" class="meta-inline-note">Quartier</label>
          <select id="quartier-select" class="meta-select" aria-label="Sélectionner le quartier"></select>
        </div>
      </div>
    </section>

    <div class="meta-grid meta-grid--two">
      <section class="meta-card">
        <h2 class="meta-card-title">Podium</h2>
        <div id="podium" class="meta-podium meta-podium--stage"></div>
      </section>

      <section class="meta-card">
        <h2 class="meta-card-title">Résumé</h2>
        <div id="board-summary" class="meta-summary-box"></div>
      </section>
    </div>

    <section class="meta-card" style="margin-top: 12px;">
      <h2 class="meta-card-title">Classement complet</h2>
      <div id="leaderboard-list" class="meta-list"></div>
    </section>

    <p id="leaderboard-status" class="meta-inline-note" style="margin-top: 10px;"></p>
  </main>

  <script>
    (function () {
      const API_URL =
        window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.protocol === "file:"
          ? "http://localhost:3000"
          : "https://camino2.onrender.com";

      const ZONE_LABELS = {
        ville: "Ville entière",
        "rues-principales": "Rues principales",
        "rues-celebres": "Rues célèbres",
        quartier: "Quartier",
        monuments: "Monuments",
      };

      const GAME_LABELS = {
        classique: "Classique",
        marathon: "Marathon",
        chrono: "Chrono",
        lecture: "Lecture",
      };

      const ZONE_ORDER = ["rues-celebres", "rues-principales", "quartier", "ville", "monuments"];
      const GAME_ORDER = ["classique", "marathon", "chrono", "lecture"];

      const TITLE_NAMES = [
        "🏛️ Maire de la Ville",
        "💪 Vrai Marseillais",
        "⚓ Habitué du Vieux-Port",
        "🧒 Minot",
        "🧳 Touriste",
      ];

      const TITLE_THRESHOLDS_BY_MODE = {
        classique: {
          "rues-celebres": { M: 60, H: 100, V: 140, MV: 180 },
          "rues-principales": { M: 50, H: 90, V: 130, MV: 170 },
          quartier: { M: 40, H: 80, V: 120, MV: 160 },
          ville: { M: 30, H: 70, V: 110, MV: 150 },
          monuments: { M: 40, H: 80, V: 120, MV: 160 },
        },
        marathon: {
          "rues-celebres": { M: 10, H: 20, V: 35, MV: 55 },
          "rues-principales": { M: 9, H: 18, V: 30, MV: 48 },
          ville: { M: 8, H: 16, V: 28, MV: 44 },
          monuments: { M: 9, H: 18, V: 30, MV: 46 },
        },
        chrono: {
          "rues-celebres": { M: 7, H: 11, V: 16, MV: 22 },
          "rues-principales": { M: 6, H: 10, V: 14, MV: 19 },
          quartier: { M: 5, H: 8, V: 12, MV: 16 },
          ville: { M: 4, H: 7, V: 10, MV: 14 },
          monuments: { M: 5, H: 8, V: 12, MV: 16 },
        },
      };

      const state = {
        period: "all",
        boards: {},
        selectedZone: "",
        selectedGame: "",
        selectedQuartier: "",
      };

      const statusEl = document.getElementById("leaderboard-status");
      const zoneSelect = document.getElementById("zone-select");
      const gameSelect = document.getElementById("game-select");
      const quartierWrap = document.getElementById("quartier-select-wrap");
      const quartierSelect = document.getElementById("quartier-select");
      const podiumEl = document.getElementById("podium");
      const boardSummaryEl = document.getElementById("board-summary");
      const listEl = document.getElementById("leaderboard-list");

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function readCurrentUser() {
        try {
          return JSON.parse(window.localStorage.getItem("camino_user") || "null");
        } catch (error) {
          return null;
        }
      }

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function buildQuartierMarathonThresholds(maxItems) {
        const total = Math.max(1, parseInt(maxItems, 10) || 55);
        const minot = Math.min(total, Math.max(1, Math.ceil(0.1 * total)));
        const habitue = Math.min(total, Math.max(minot + 1, Math.ceil(0.2 * total)));
        const vrai = Math.min(total, Math.max(habitue + 1, Math.ceil(0.35 * total)));
        const maire = Math.min(total, Math.max(vrai + 1, Math.ceil(0.55 * total)));
        return { M: minot, H: habitue, V: vrai, MV: maire };
      }

      function getTitleThresholds(mode, gameType, maxItems) {
        const modeThresholds = TITLE_THRESHOLDS_BY_MODE[gameType] || TITLE_THRESHOLDS_BY_MODE.classique;
        if (gameType === "marathon" && mode === "quartier") {
          return buildQuartierMarathonThresholds(maxItems);
        }
        return modeThresholds[mode] || modeThresholds.quartier || TITLE_THRESHOLDS_BY_MODE.classique.quartier;
      }

      function getTitleScoreValue(highScore, bestItemsCorrect, gameType) {
        if (gameType === "classique") {
          return parseFloat(highScore) || 0;
        }
        const parsed = parseFloat(bestItemsCorrect);
        return Number.isFinite(parsed) ? parsed : parseFloat(highScore) || 0;
      }

      function getPlayerTitle(score, zoneMode, gameType, itemsTotal, itemsCorrect) {
        const thresholds = getTitleThresholds(zoneMode, gameType || "classique", itemsTotal || 0);
        const scoreValue = getTitleScoreValue(score, itemsCorrect, gameType || "classique");
        return scoreValue >= thresholds.MV
          ? TITLE_NAMES[0]
          : scoreValue >= thresholds.V
            ? TITLE_NAMES[1]
            : scoreValue >= thresholds.H
              ? TITLE_NAMES[2]
              : scoreValue >= thresholds.M
                ? TITLE_NAMES[3]
                : TITLE_NAMES[4];
      }

      function formatScore(row, gameType) {
        if (gameType === "classique") {
          return typeof row.high_score === "number" ? row.high_score.toFixed(1) : Number(row.high_score || 0).toFixed(1);
        }
        if (gameType === "chrono") {
          const found = Number(row.items_correct || 0);
          const time = Number(row.time_sec || 0).toFixed(1);
          return `${found} • ${time}s`;
        }
        return String(Math.round(Number(row.items_correct || 0)));
      }

      function parseBoardKey(key) {
        const parts = String(key || "").split("|");
        const zone = parts[0] || "";
        const game = parts[1] || "";
        const quartier = parts.length > 2 ? parts.slice(2).join("|") : "";
        return { key, zone, game, quartier };
      }

      function getBoardEntries() {
        return Object.entries(state.boards || {})
          .filter(([, rows]) => Array.isArray(rows) && rows.length > 0)
          .map(([key, rows]) => ({ ...parseBoardKey(key), rows }));
      }

      function populateZoneOptions(entries) {
        const zones = new Set(entries.map((entry) => entry.zone));
        const orderedZones = Array.from(zones).sort((left, right) => {
          const leftIndex = ZONE_ORDER.indexOf(left);
          const rightIndex = ZONE_ORDER.indexOf(right);
          const a = leftIndex >= 0 ? leftIndex : 999;
          const b = rightIndex >= 0 ? rightIndex : 999;
          if (a !== b) return a - b;
          return left.localeCompare(right, "fr");
        });

        zoneSelect.innerHTML = orderedZones
          .map((zone) => `<option value="${escapeHtml(zone)}">${escapeHtml(ZONE_LABELS[zone] || zone)}</option>`)
          .join("");

        if (!orderedZones.length) {
          state.selectedZone = "";
          return;
        }

        if (!orderedZones.includes(state.selectedZone)) {
          state.selectedZone = orderedZones[0];
        }
        zoneSelect.value = state.selectedZone;
      }

      function populateGameOptions(entries) {
        const games = new Set(
          entries
            .filter((entry) => entry.zone === state.selectedZone)
            .map((entry) => entry.game),
        );

        const orderedGames = Array.from(games).sort((left, right) => {
          const leftIndex = GAME_ORDER.indexOf(left);
          const rightIndex = GAME_ORDER.indexOf(right);
          const a = leftIndex >= 0 ? leftIndex : 999;
          const b = rightIndex >= 0 ? rightIndex : 999;
          if (a !== b) return a - b;
          return left.localeCompare(right, "fr");
        });

        gameSelect.innerHTML = orderedGames
          .map((game) => `<option value="${escapeHtml(game)}">${escapeHtml(GAME_LABELS[game] || game)}</option>`)
          .join("");

        if (!orderedGames.length) {
          state.selectedGame = "";
          return;
        }

        if (!orderedGames.includes(state.selectedGame)) {
          state.selectedGame = orderedGames[0];
        }
        gameSelect.value = state.selectedGame;
      }

      function populateQuartierOptions(entries) {
        const needsQuartier = state.selectedZone === "quartier";
        quartierWrap.classList.toggle("hidden", !needsQuartier);

        if (!needsQuartier) {
          state.selectedQuartier = "";
          quartierSelect.innerHTML = "";
          return;
        }

        const quartiers = entries
          .filter((entry) => entry.zone === "quartier" && entry.game === state.selectedGame)
          .map((entry) => entry.quartier || "")
          .filter((quartier) => quartier && quartier !== "unknown")
          .sort((left, right) => left.localeCompare(right, "fr"));

        const uniqueQuartiers = Array.from(new Set(quartiers));

        if (!uniqueQuartiers.length) {
          quartierSelect.innerHTML = `<option value="unknown">Quartier non renseigné</option>`;
          state.selectedQuartier = "unknown";
          quartierSelect.value = state.selectedQuartier;
          return;
        }

        quartierSelect.innerHTML = uniqueQuartiers
          .map((quartier) => `<option value="${escapeHtml(quartier)}">${escapeHtml(quartier)}</option>`)
          .join("");

        if (!uniqueQuartiers.includes(state.selectedQuartier)) {
          state.selectedQuartier = uniqueQuartiers[0];
        }
        quartierSelect.value = state.selectedQuartier;
      }

      function getSelectedBoard(entries) {
        if (!state.selectedZone || !state.selectedGame) {
          return null;
        }

        if (state.selectedZone === "quartier") {
          const exact = entries.find((entry) =>
            entry.zone === "quartier" &&
            entry.game === state.selectedGame &&
            entry.quartier === state.selectedQuartier,
          );
          if (exact) {
            return exact;
          }

          return entries.find((entry) =>
            entry.zone === "quartier" &&
            entry.game === state.selectedGame,
          ) || null;
        }

        return entries.find((entry) =>
          entry.zone === state.selectedZone &&
          entry.game === state.selectedGame &&
          !entry.quartier,
        ) || entries.find((entry) =>
          entry.zone === state.selectedZone && entry.game === state.selectedGame,
        ) || null;
      }

      function renderPodium(rows, zoneMode, gameType) {
        if (!rows.length) {
          podiumEl.innerHTML = "<p class=\"meta-empty\">Aucun score sur ce tableau.</p>";
          return;
        }

        const first = rows[0] || null;
        const second = rows[1] || null;
        const third = rows[2] || null;

        const spots = [
          { rank: 2, row: second, stage: "stage-2" },
          { rank: 1, row: first, stage: "stage-1" },
          { rank: 3, row: third, stage: "stage-3" },
        ];

        podiumEl.innerHTML = `
          <div class="meta-podium-stage-grid">
            ${spots.map((spot) => {
          if (!spot.row) {
            return `<article class="meta-podium-spot ${spot.stage} is-empty"><div class="meta-podium-plinth"></div></article>`;
          }
          const title = getPlayerTitle(
            spot.row.high_score || 0,
            zoneMode,
            gameType,
            spot.row.items_total || 0,
            spot.row.items_correct || 0,
          );
          return `
                <article class="meta-podium-spot ${spot.stage}">
                  <div class="meta-podium-rank-badge">#${spot.rank}</div>
                  <div class="meta-podium-avatar">${escapeHtml(spot.row.avatar || "👤")}</div>
                  <div class="meta-podium-name">${escapeHtml(spot.row.username || "Anonyme")}</div>
                  <div class="meta-podium-title">${escapeHtml(title)}</div>
                  <div class="meta-podium-score">${escapeHtml(formatScore(spot.row, gameType))}</div>
                  <div class="meta-podium-plinth"></div>
                </article>`;
        }).join("")}
          </div>`;
      }

      function renderSummary(boardEntry) {
        const rows = boardEntry.rows;
        const zoneLabel = ZONE_LABELS[boardEntry.zone] || boardEntry.zone;
        const gameLabel = GAME_LABELS[boardEntry.game] || boardEntry.game;
        const boardLabel = `${zoneLabel} • ${gameLabel}${boardEntry.quartier ? ` • ${boardEntry.quartier}` : ""}`;

        const currentUser = readCurrentUser();
        const currentUsername = String(currentUser && currentUser.username ? currentUser.username : "").trim().toLowerCase();
        const userIndex = currentUsername
          ? rows.findIndex((row) => String(row && row.username ? row.username : "").trim().toLowerCase() === currentUsername)
          : -1;
        const winner = rows[0] || null;

        const youHtml =
          !currentUsername
            ? "Connectez-vous pour afficher votre position."
            : userIndex >= 0
              ? `Vous êtes <strong>#${userIndex + 1}</strong> sur ce tableau.`
              : "Vous n'êtes pas encore classé sur ce tableau.";

        boardSummaryEl.innerHTML = `
          <div class="meta-summary-line"><span>Tableau</span><strong>${escapeHtml(boardLabel)}</strong></div>
          <div class="meta-summary-line"><span>Joueurs classés</span><strong>${rows.length}</strong></div>
          <div class="meta-summary-line"><span>Leader</span><strong>${winner ? escapeHtml(winner.username || "Anonyme") : "—"}</strong></div>
          <div class="meta-summary-line"><span>Top score</span><strong>${winner ? escapeHtml(formatScore(winner, boardEntry.game)) : "—"}</strong></div>
          <div class="meta-summary-you">${youHtml}</div>`;
      }

      function renderList(boardEntry) {
        const rows = boardEntry.rows;
        if (!rows.length) {
          listEl.innerHTML = "<p class=\"meta-empty\">Aucun score enregistré.</p>";
          return;
        }

        listEl.innerHTML = rows.map((row, index) => {
          const title = getPlayerTitle(
            row.high_score || 0,
            boardEntry.zone,
            boardEntry.game,
            row.items_total || 0,
            row.items_correct || 0,
          );
          return `
            <article class="meta-list-card">
              <div class="meta-list-rank">#${index + 1}</div>
              <div class="meta-list-player">
                <div class="meta-list-name"><span>${escapeHtml(row.avatar || "👤")}</span><span>${escapeHtml(row.username || "Anonyme")}</span></div>
                <div class="meta-list-title">${escapeHtml(title)}</div>
              </div>
              <div class="meta-list-score">${escapeHtml(formatScore(row, boardEntry.game))}</div>
            </article>`;
        }).join("");
      }

      function renderSelectedBoard(entries) {
        const boardEntry = getSelectedBoard(entries);
        if (!boardEntry) {
          podiumEl.innerHTML = "<p class=\"meta-empty\">Aucun classement disponible pour cette sélection.</p>";
          boardSummaryEl.innerHTML = "<p class=\"meta-empty\">Sélectionnez une autre combinaison zone/mode.</p>";
          listEl.innerHTML = "";
          return;
        }

        renderPodium(boardEntry.rows, boardEntry.zone, boardEntry.game);
        renderSummary(boardEntry);
        renderList(boardEntry);
      }

      function updateSelectorsAndRender() {
        const entries = getBoardEntries();
        if (!entries.length) {
          zoneSelect.innerHTML = "";
          gameSelect.innerHTML = "";
          quartierSelect.innerHTML = "";
          quartierWrap.classList.add("hidden");
          podiumEl.innerHTML = "<p class=\"meta-empty\">Aucun score enregistré.</p>";
          boardSummaryEl.innerHTML = "<p class=\"meta-empty\">Aucune donnée.</p>";
          listEl.innerHTML = "";
          return;
        }

        populateZoneOptions(entries);
        populateGameOptions(entries);
        populateQuartierOptions(entries);
        renderSelectedBoard(entries);
      }

      async function loadLeaderboards() {
        setStatus("Chargement des classements…");
        const periodSuffix = state.period === "month" ? "?period=month" : "";

        try {
          const response = await fetch(`${API_URL}/api/leaderboards${periodSuffix}`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          state.boards = await response.json();
          updateSelectorsAndRender();

          const count = getBoardEntries().length;
          setStatus(count ? `${count} tableaux disponibles (${state.period === "month" ? "mensuel" : "all-time"}).` : "Aucun score enregistré.");
        } catch (error) {
          console.warn("Leaderboard page load error:", error);
          state.boards = {};
          updateSelectorsAndRender();
          setStatus("Erreur de chargement du classement.");
        }
      }

      zoneSelect.addEventListener("change", () => {
        state.selectedZone = zoneSelect.value;
        state.selectedQuartier = "";
        updateSelectorsAndRender();
      });

      gameSelect.addEventListener("change", () => {
        state.selectedGame = gameSelect.value;
        state.selectedQuartier = "";
        updateSelectorsAndRender();
      });

      quartierSelect.addEventListener("change", () => {
        state.selectedQuartier = quartierSelect.value;
        updateSelectorsAndRender();
      });

      document.querySelectorAll("#period-controls [data-period]").forEach((button) => {
        button.addEventListener("click", () => {
          const nextPeriod = String(button.getAttribute("data-period") || "all");
          if (nextPeriod === state.period) {
            return;
          }
          state.period = nextPeriod;
          document.querySelectorAll("#period-controls [data-period]").forEach((candidate) => {
            candidate.classList.toggle("is-active", candidate === button);
          });
          loadLeaderboards();
        });
      });

      loadLeaderboards();
    })();
  </script>
</body>

</html>
