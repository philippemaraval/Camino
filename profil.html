<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camino - Profil</title>
  <meta name="description" content="Profil joueur Camino : statistiques globales, progression par mode et séries Daily.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Montserrat:wght@600;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260320p3">
</head>

<body class="meta-page-body">
  <main class="meta-shell">
    <header class="meta-topbar">
      <a class="meta-back-link" href="/">← Retour au jeu</a>
      <nav class="meta-nav" aria-label="Navigation">
        <a class="meta-nav-link" href="/">Jeu</a>
        <a class="meta-nav-link is-active" href="/profil.html">Profil</a>
        <a class="meta-nav-link" href="/classement.html">Classement</a>
        <a class="meta-nav-link" href="/daily-resultats.html">Daily</a>
        <a class="meta-nav-link" href="/regles.html">Règles</a>
      </nav>
    </header>

    <section class="meta-hero">
      <h1 class="meta-title">Profil Joueur</h1>
      <p class="meta-subtitle">Avatar, succès, statistiques avancées et progression complète.</p>
    </section>

    <div id="profile-root" class="meta-grid">
      <section class="meta-card">
        <p class="meta-inline-note">Chargement du profil…</p>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const API_URL =
        window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.protocol === "file:"
          ? "http://localhost:3000"
          : "https://camino2.onrender.com";

      const ZONE_LABELS = {
        ville: "Ville entière",
        "rues-principales": "Rues principales",
        "rues-celebres": "Rues célèbres",
        quartier: "Quartier",
        monuments: "Monuments",
      };

      const GAME_LABELS = {
        classique: "Classique",
        marathon: "Marathon",
        chrono: "Chrono",
        lecture: "Lecture",
      };

      const TITLE_NAMES = [
        "🏛️ Maire de la Ville",
        "💪 Vrai Marseillais",
        "⚓ Habitué du Vieux-Port",
        "🧒 Minot",
        "🧳 Touriste",
      ];

      const TITLE_THRESHOLDS_BY_MODE = {
        classique: {
          "rues-celebres": { M: 60, H: 100, V: 140, MV: 180 },
          "rues-principales": { M: 50, H: 90, V: 130, MV: 170 },
          quartier: { M: 40, H: 80, V: 120, MV: 160 },
          ville: { M: 30, H: 70, V: 110, MV: 150 },
          monuments: { M: 40, H: 80, V: 120, MV: 160 },
        },
        marathon: {
          "rues-celebres": { M: 10, H: 20, V: 35, MV: 55 },
          "rues-principales": { M: 9, H: 18, V: 30, MV: 48 },
          ville: { M: 8, H: 16, V: 28, MV: 44 },
          monuments: { M: 9, H: 18, V: 30, MV: 46 },
        },
        chrono: {
          "rues-celebres": { M: 7, H: 11, V: 16, MV: 22 },
          "rues-principales": { M: 6, H: 10, V: 14, MV: 19 },
          quartier: { M: 5, H: 8, V: 12, MV: 16 },
          ville: { M: 4, H: 7, V: 10, MV: 14 },
          monuments: { M: 5, H: 8, V: 12, MV: 16 },
        },
      };

      const AVATAR_UNLOCKS = [
        { emoji: "👤", reqTitleIdx: 4 },
        { emoji: "🧑", reqTitleIdx: 4 },
        { emoji: "👧", reqTitleIdx: 4 },
        { emoji: "🧒", reqTitleIdx: 3 },
        { emoji: "🛴", reqTitleIdx: 3 },
        { emoji: "🍕", reqTitleIdx: 3 },
        { emoji: "⚓", reqTitleIdx: 2 },
        { emoji: "🐟", reqTitleIdx: 2 },
        { emoji: "⛵", reqTitleIdx: 2 },
        { emoji: "🌊", reqTitleIdx: 2 },
        { emoji: "💪", reqTitleIdx: 1 },
        { emoji: "☀️", reqTitleIdx: 1 },
        { emoji: "🏖️", reqTitleIdx: 1 },
        { emoji: "😎", reqTitleIdx: 1 },
        { emoji: "🏛️", reqTitleIdx: 0 },
        { emoji: "🦅", reqTitleIdx: 0 },
        { emoji: "⚽", reqTitleIdx: 0 },
        { emoji: "👑", reqTitleIdx: 0 },
      ];

      const state = {
        currentUser: null,
        profile: null,
        notificationStatusText: "Statut du rappel indisponible.",
      };

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function readCurrentUser() {
        try {
          return JSON.parse(window.localStorage.getItem("camino_user") || "null");
        } catch (error) {
          return null;
        }
      }

      function saveCurrentUser(user) {
        try {
          window.localStorage.setItem("camino_user", JSON.stringify(user));
        } catch (error) {
          // ignore localStorage failures
        }
      }

      function buildQuartierMarathonThresholds(maxItems) {
        const total = Math.max(1, parseInt(maxItems, 10) || 55);
        const minot = Math.min(total, Math.max(1, Math.ceil(0.1 * total)));
        const habitue = Math.min(total, Math.max(minot + 1, Math.ceil(0.2 * total)));
        const vrai = Math.min(total, Math.max(habitue + 1, Math.ceil(0.35 * total)));
        const maire = Math.min(total, Math.max(vrai + 1, Math.ceil(0.55 * total)));
        return { M: minot, H: habitue, V: vrai, MV: maire };
      }

      function getTitleThresholds(mode, gameType, maxItems) {
        const modeThresholds = TITLE_THRESHOLDS_BY_MODE[gameType] || TITLE_THRESHOLDS_BY_MODE.classique;
        if (gameType === "marathon" && mode === "quartier") {
          return buildQuartierMarathonThresholds(maxItems);
        }
        return modeThresholds[mode] || modeThresholds.quartier || TITLE_THRESHOLDS_BY_MODE.classique.quartier;
      }

      function getTitleScoreValue(highScore, bestItemsCorrect, gameType) {
        if (gameType === "classique") {
          return parseFloat(highScore) || 0;
        }
        const parsed = parseFloat(bestItemsCorrect);
        return Number.isFinite(parsed) ? parsed : parseFloat(highScore) || 0;
      }

      function hasReachedGlobalRank(profile, rankLetter) {
        const scoringGameTypes = ["classique", "marathon", "chrono"];
        const scoringZones = ["rues-celebres", "rues-principales", "quartier", "monuments"];
        const combos = new Map();
        (profile.modes || []).forEach((modeStats) => {
          combos.set(`${modeStats.mode}|${modeStats.game_type}`, modeStats);
        });

        return scoringGameTypes.every((gameType) => {
          return scoringZones.every((zoneMode) => {
            const combo = combos.get(`${zoneMode}|${gameType}`);
            if (!combo) {
              return false;
            }
            const thresholds = getTitleThresholds(zoneMode, gameType, combo.best_items_total || 0);
            const scoreValue = getTitleScoreValue(combo.high_score, combo.best_items_correct, gameType);
            return typeof thresholds[rankLetter] === "number" && scoreValue >= thresholds[rankLetter];
          });
        });
      }

      function getGlobalRankLevel(profile) {
        return hasReachedGlobalRank(profile, "MV")
          ? 4
          : hasReachedGlobalRank(profile, "V")
            ? 3
            : hasReachedGlobalRank(profile, "H")
              ? 2
              : hasReachedGlobalRank(profile, "M")
                ? 1
                : 0;
      }

      function getGlobalRankTitle(profile) {
        const level = getGlobalRankLevel(profile);
        return level >= 4
          ? TITLE_NAMES[0]
          : level >= 3
            ? TITLE_NAMES[1]
            : level >= 2
              ? TITLE_NAMES[2]
              : level >= 1
                ? TITLE_NAMES[3]
                : TITLE_NAMES[4];
      }

      function getGlobalRankLevelForTitleIndex(titleIndex) {
        const parsed = parseInt(titleIndex, 10);
        return Math.max(0, 4 - (Number.isNaN(parsed) ? 4 : parsed));
      }

      function getPlayerTitle(score, zoneMode, gameType, itemsTotal, itemsCorrect) {
        const thresholds = getTitleThresholds(zoneMode, gameType || "classique", itemsTotal || 0);
        const scoreValue = getTitleScoreValue(score, itemsCorrect, gameType || "classique");
        return scoreValue >= thresholds.MV
          ? TITLE_NAMES[0]
          : scoreValue >= thresholds.V
            ? TITLE_NAMES[1]
            : scoreValue >= thresholds.H
              ? TITLE_NAMES[2]
              : scoreValue >= thresholds.M
                ? TITLE_NAMES[3]
                : TITLE_NAMES[4];
      }

      function formatDate(dateValue) {
        if (!dateValue) {
          return "—";
        }
        try {
          return new Date(dateValue).toLocaleDateString("fr-FR", {
            day: "numeric",
            month: "long",
            year: "numeric",
          });
        } catch (error) {
          return "—";
        }
      }

      function modeScoreLabel(row) {
        if ((row.game_type || "") === "classique") {
          return Number(row.high_score || 0).toFixed(1);
        }
        return String(Math.round(Number(row.best_items_correct || row.high_score || 0)));
      }

      function computeBadges(profile) {
        const defs = [
          { id: "first_game", emoji: "🎮", name: "Première Partie", desc: "Terminer une session", check: (p) => (parseInt(p.overall?.total_games, 10) || 0) >= 1 },
          { id: "games_25", emoji: "🔟", name: "25 Parties", desc: "Jouer 25 sessions", check: (p) => (parseInt(p.overall?.total_games, 10) || 0) >= 25 },
          { id: "games_100", emoji: "💯", name: "Habitué", desc: "Jouer 100 sessions", check: (p) => (parseInt(p.overall?.total_games, 10) || 0) >= 100 },
          { id: "games_250", emoji: "💎", name: "Vétéran", desc: "Jouer 250 sessions", check: (p) => (parseInt(p.overall?.total_games, 10) || 0) >= 250 },
          { id: "minot", emoji: "🧒", name: "Minot", desc: "Atteindre Minot dans tous les modes/zones", check: (p) => hasReachedGlobalRank(p, "M") },
          { id: "habitue", emoji: "⚓", name: "Habitué du Vieux-Port", desc: "Atteindre Habitué dans tous les modes/zones", check: (p) => hasReachedGlobalRank(p, "H") },
          { id: "vrai", emoji: "💪", name: "Vrai Marseillais", desc: "Atteindre Vrai Marseillais dans tous les modes/zones", check: (p) => hasReachedGlobalRank(p, "V") },
          { id: "maire", emoji: "🏛️", name: "Maire de la Ville", desc: "Atteindre Maire dans tous les modes/zones", check: (p) => hasReachedGlobalRank(p, "MV") },
          { id: "daily_1", emoji: "📅", name: "Premier Daily", desc: "Réussir un Daily", check: (p) => (parseInt(p.daily?.successes, 10) || 0) >= 1 },
          { id: "daily_10", emoji: "🔥", name: "Série de 10", desc: "10 Daily d'affilée", check: (p) => (parseInt(p.daily?.max_streak, 10) || 0) >= 10 },
          { id: "daily_20", emoji: "⚡", name: "Série de 20", desc: "20 Daily d'affilée", check: (p) => (parseInt(p.daily?.max_streak, 10) || 0) >= 20 },
          { id: "perfect", emoji: "🎯", name: "Sans Faute", desc: "Score de 100 en session", check: (p) => (parseFloat(p.overall?.best_score) || 0) >= 100 },
        ];
        return defs.map((def) => ({ ...def, unlocked: def.check(profile) }));
      }

      function renderNotConnected(root) {
        root.innerHTML = `
          <section class="meta-card">
            <h2 class="meta-card-title">Connexion requise</h2>
            <p class="meta-inline-note">Aucun profil détecté dans ce navigateur.</p>
            <p class="meta-inline-note">Connectez-vous depuis la page de jeu, puis revenez ici.</p>
            <div style="margin-top: 12px;"><a class="meta-back-link" href="/">Ouvrir le jeu</a></div>
          </section>`;
      }

      function renderAvatarGrid() {
        const profile = state.profile;
        const grid = document.getElementById("profile-avatar-grid");
        if (!grid || !profile) {
          return;
        }

        const globalRankLevel = getGlobalRankLevel(profile);
        const currentAvatar = profile.avatar || "👤";

        grid.innerHTML = AVATAR_UNLOCKS.map((avatarDef) => {
          const requiredLevel = getGlobalRankLevelForTitleIndex(avatarDef.reqTitleIdx);
          const unlocked = globalRankLevel >= requiredLevel;
          const title = unlocked
            ? "Débloqué"
            : `Titre requis: ${TITLE_NAMES[avatarDef.reqTitleIdx] || TITLE_NAMES[4]}`;
          return `
            <button
              type="button"
              class="avatar-item ${unlocked ? "" : "locked"} ${avatarDef.emoji === currentAvatar ? "selected" : ""}"
              data-avatar="${escapeHtml(avatarDef.emoji)}"
              ${unlocked ? "" : "disabled"}
              title="${escapeHtml(title)}"
              aria-label="Avatar ${escapeHtml(avatarDef.emoji)}"
            >${escapeHtml(avatarDef.emoji)}</button>`;
        }).join("");

        grid.querySelectorAll("button[data-avatar]").forEach((button) => {
          button.addEventListener("click", async () => {
            const nextAvatar = button.getAttribute("data-avatar") || "";
            if (!nextAvatar) {
              return;
            }
            await saveAvatar(nextAvatar);
          });
        });
      }

      function openAvatarModal() {
        const modal = document.getElementById("profile-avatar-modal");
        if (!modal) {
          return;
        }
        modal.classList.remove("hidden");
        renderAvatarGrid();
      }

      function closeAvatarModal() {
        const modal = document.getElementById("profile-avatar-modal");
        if (!modal) {
          return;
        }
        modal.classList.add("hidden");
      }

      async function saveAvatar(avatar) {
        const user = state.currentUser;
        if (!user || !user.token) {
          return;
        }

        const feedbackEl = document.getElementById("avatar-modal-feedback");
        if (feedbackEl) {
          feedbackEl.textContent = "Enregistrement...";
        }

        try {
          const response = await fetch(`${API_URL}/api/profile/avatar`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${user.token}`,
            },
            body: JSON.stringify({ avatar }),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          state.profile.avatar = avatar;
          state.currentUser.avatar = avatar;
          saveCurrentUser(state.currentUser);
          renderProfile(document.getElementById("profile-root"));
        } catch (error) {
          if (feedbackEl) {
            feedbackEl.textContent = "Impossible de mettre à jour l'avatar.";
          }
        }
      }

      function bindProfileEvents() {
        const openBtn = document.getElementById("profile-change-avatar");
        const closeBtn = document.getElementById("profile-avatar-close");
        const backdrop = document.getElementById("profile-avatar-backdrop");

        if (openBtn) {
          openBtn.addEventListener("click", openAvatarModal);
        }
        if (closeBtn) {
          closeBtn.addEventListener("click", closeAvatarModal);
        }
        if (backdrop) {
          backdrop.addEventListener("click", closeAvatarModal);
        }
      }

      function renderProfile(root) {
        const profile = state.profile;
        const totalGames = parseInt(profile.overall?.total_games, 10) || 0;
        const bestScore = Number(profile.overall?.best_score) || 0;
        const avgScore = Number(profile.overall?.avg_score) || 0;
        const daily = profile.daily || {};
        const globalTitle = getGlobalRankTitle(profile);

        const modes = Array.isArray(profile.modes) ? profile.modes.slice() : [];
        modes.sort((left, right) => Number(right.games_played || 0) - Number(left.games_played || 0));

        const weekly = Array.isArray(profile.weekly_progress) ? profile.weekly_progress.slice(-8) : [];
        const weeklyMax = weekly.reduce((max, item) => Math.max(max, Number(item.avg_score || 0)), 0) || 1;

        const quartierStats = Array.isArray(profile.quartier_stats) ? profile.quartier_stats.slice(0, 10) : [];
        const difficultyStats = Array.isArray(profile.difficulty_stats) ? profile.difficulty_stats.slice() : [];

        const badges = computeBadges(profile);
        const unlockedCount = badges.filter((badge) => badge.unlocked).length;

        root.innerHTML = `
          <div class="meta-grid meta-grid--two">
            <section class="meta-card">
              <div class="profile-header">
                <div class="profile-avatar">${escapeHtml(profile.avatar || "👤")}</div>
                <div class="profile-info">
                  <div class="profile-name">${escapeHtml(profile.username || "Joueur")}</div>
                  <div class="profile-title">${escapeHtml(globalTitle)}</div>
                </div>
              </div>

              <div class="meta-controls-row" style="margin-top: 6px; margin-bottom: 12px;">
                <button type="button" id="profile-change-avatar" class="btn-secondary">Changer d'avatar</button>
              </div>

              <div class="profile-stats-grid">
                <div class="profile-stat">
                  <span class="profile-stat-value">${totalGames}</span>
                  <span class="profile-stat-label">Parties</span>
                </div>
                <div class="profile-stat">
                  <span class="profile-stat-value">${bestScore.toFixed(1)}</span>
                  <span class="profile-stat-label">Meilleur</span>
                </div>
                <div class="profile-stat">
                  <span class="profile-stat-value">${avgScore.toFixed(1)}</span>
                  <span class="profile-stat-label">Moyenne</span>
                </div>
                <div class="profile-stat">
                  <span class="profile-stat-value">${Number(daily.successes || 0)}/${Number(daily.total_days || 0)}</span>
                  <span class="profile-stat-label">Daily ✅</span>
                </div>
              </div>

              <div class="profile-daily-summary">
                <span>🔥 Série actuelle : <strong>${Number(daily.current_streak || 0)}</strong></span><br>
                <span>🏆 Meilleure série : <strong>${Number(daily.max_streak || 0)}</strong></span><br>
                <span>🎯 Moyenne Daily : <strong>${Number(daily.avg_attempts || 0).toFixed(1)} essais</strong></span>
              </div>

              <div class="profile-notification-card">
                <div class="profile-notification-title">Rappel Daily</div>
                <p class="profile-notification-status">${escapeHtml(state.notificationStatusText)}</p>
                <p class="meta-inline-note">Gestion complète du rappel depuis la page de jeu.</p>
              </div>

              <p class="profile-member-since">Membre depuis le ${escapeHtml(formatDate(profile.memberSince))}</p>
            </section>

            <section class="meta-card">
              <h2 class="meta-card-title">Progression hebdomadaire</h2>
              ${weekly.length ? `<div class="profile-weekly-chart">${weekly.map((row) => {
          const score = Number(row.avg_score || 0);
          const height = Math.max(4, Math.round((score / weeklyMax) * 72));
          return `<div class=\"profile-weekly-col\"><div class=\"profile-weekly-bar\" style=\"height:${height}px\"></div><span class=\"profile-weekly-col-label\">${escapeHtml(row.label || "")}</span></div>`;
        }).join("")}</div>` : `<p class="meta-empty">Pas encore assez de données hebdomadaires.</p>`}
            </section>
          </div>

          <section class="meta-card" style="margin-top: 12px;">
            <h2 class="meta-card-title">Succès (${unlockedCount}/${badges.length})</h2>
            <div class="profile-badges-grid">
              ${badges.map((badge) => `
                <div class="profile-badge ${badge.unlocked ? "unlocked" : "locked"}" title="${escapeHtml(`${badge.name} — ${badge.desc}`)}">
                  <span class="badge-emoji">${badge.unlocked ? escapeHtml(badge.emoji) : "🔒"}</span>
                  <span class="badge-name">${escapeHtml(badge.name)}</span>
                </div>`).join("")}
            </div>
          </section>

          <section class="meta-card" style="margin-top: 12px;">
            <h2 class="meta-card-title">Détail par mode</h2>
            ${modes.length ? `<div class="profile-modes">${modes.map((row) => {
          const zoneLabel = ZONE_LABELS[row.mode] || row.mode;
          const gameLabel = GAME_LABELS[row.game_type] || row.game_type;
          const title = getPlayerTitle(
            Number(row.high_score || 0),
            row.mode,
            row.game_type,
            row.best_items_total || 0,
            row.best_items_correct || 0,
          );
          return `
                <div class=\"profile-mode-row\">
                  <div class=\"profile-mode-name\">${escapeHtml(zoneLabel)} — ${escapeHtml(gameLabel)}</div>
                  <div class=\"profile-mode-details\">
                    <span>🏆 ${escapeHtml(modeScoreLabel(row))}</span>
                    <span>📊 Ø${Number(row.avg_score || 0).toFixed(1)}</span>
                    <span>🎮 ${Number(row.games_played || 0)}</span>
                  </div>
                  <div class=\"profile-mode-title\">${escapeHtml(title)}</div>
                </div>`;
        }).join("")}</div>` : `<p class="meta-empty">Aucune partie enregistrée pour l'instant.</p>`}
          </section>

          <div class="meta-grid meta-grid--two" style="margin-top: 12px;">
            <section class="meta-card">
              <h2 class="meta-card-title">Quartiers travaillés</h2>
              ${quartierStats.length ? `
                <table class="profile-mini-table">
                  <thead>
                    <tr><th>Quartier</th><th>Parties</th><th>Réussite</th><th>Temps</th></tr>
                  </thead>
                  <tbody>
                    ${quartierStats.map((row) => `
                      <tr>
                        <td>${escapeHtml(row.quartier_name || "—")}</td>
                        <td>${Number(row.games_played || 0)}</td>
                        <td>${Number(row.success_rate || 0).toFixed(1)}%</td>
                        <td>${Number(row.avg_time_sec || 0).toFixed(1)}s</td>
                      </tr>`).join("")}
                  </tbody>
                </table>`
          : `<p class="meta-empty">Pas encore de données par quartier.</p>`}
            </section>

            <section class="meta-card">
              <h2 class="meta-card-title">Performance par zone</h2>
              ${difficultyStats.length ? `
                <table class="profile-mini-table">
                  <thead>
                    <tr><th>Zone</th><th>Parties</th><th>Réussite</th><th>Temps</th></tr>
                  </thead>
                  <tbody>
                    ${difficultyStats.map((row) => `
                      <tr>
                        <td>${escapeHtml(ZONE_LABELS[row.mode] || row.mode || "—")}</td>
                        <td>${Number(row.games_played || 0)}</td>
                        <td>${Number(row.success_rate || 0).toFixed(1)}%</td>
                        <td>${Number(row.avg_time_sec || 0).toFixed(1)}s</td>
                      </tr>`).join("")}
                  </tbody>
                </table>`
          : `<p class="meta-empty">Pas encore de données avancées.</p>`}
            </section>
          </div>

          <div id="profile-avatar-modal" class="meta-avatar-modal hidden" aria-hidden="true">
            <div id="profile-avatar-backdrop" class="meta-avatar-backdrop"></div>
            <section class="meta-avatar-dialog" role="dialog" aria-modal="true" aria-label="Choisir un avatar">
              <div class="avatar-modal-header">
                <h4>Choisir un avatar</h4>
                <button id="profile-avatar-close" class="avatar-modal-close" type="button" aria-label="Fermer">×</button>
              </div>
              <p id="avatar-modal-feedback" class="meta-inline-note"></p>
              <div id="profile-avatar-grid" class="avatar-grid"></div>
            </section>
          </div>`;

        bindProfileEvents();
      }

      async function getNotificationStatusText(user) {
        if (!user || !user.token) {
          return "Connectez-vous pour activer les notifications.";
        }
        try {
          const response = await fetch(`${API_URL}/api/notifications/status`, {
            headers: { Authorization: `Bearer ${user.token}` },
          });
          if (!response.ok) {
            return "Statut du rappel indisponible.";
          }
          const payload = await response.json();
          const reminder = payload?.reminder || { hour: 10, minute: 0, timezone: "Europe/Paris" };
          const label = `${String(reminder.hour).padStart(2, "0")}:${String(reminder.minute).padStart(2, "0")} (${reminder.timezone || "Europe/Paris"})`;
          if (!payload.enabled) {
            return "Rappels push indisponibles côté serveur.";
          }
          return payload.subscribed ? `Rappel actif tous les jours à ${label}.` : `Rappel inactif (horaire: ${label}).`;
        } catch (error) {
          return "Statut du rappel indisponible.";
        }
      }

      async function loadProfilePage() {
        const root = document.getElementById("profile-root");
        state.currentUser = readCurrentUser();

        if (!state.currentUser || !state.currentUser.token) {
          renderNotConnected(root);
          return;
        }

        try {
          const [profileResponse, notificationStatusText] = await Promise.all([
            fetch(`${API_URL}/api/profile`, {
              headers: { Authorization: `Bearer ${state.currentUser.token}` },
            }),
            getNotificationStatusText(state.currentUser),
          ]);

          if (profileResponse.status === 401 || profileResponse.status === 403) {
            window.localStorage.removeItem("camino_user");
            renderNotConnected(root);
            return;
          }

          if (!profileResponse.ok) {
            throw new Error(`HTTP ${profileResponse.status}`);
          }

          state.profile = await profileResponse.json();
          state.notificationStatusText = notificationStatusText;

          if (state.currentUser) {
            state.currentUser.username = state.profile.username || state.currentUser.username;
            state.currentUser.avatar = state.profile.avatar || state.currentUser.avatar;
            saveCurrentUser(state.currentUser);
          }

          renderProfile(root);
        } catch (error) {
          console.warn("Profile page load error:", error);
          root.innerHTML = `
            <section class="meta-card">
              <h2 class="meta-card-title">Profil indisponible</h2>
              <p class="meta-inline-note">Impossible de charger vos données actuellement.</p>
              <div style="margin-top: 12px;"><a class="meta-back-link" href="/">Retour au jeu</a></div>
            </section>`;
        }
      }

      loadProfilePage();
    })();
  </script>
</body>
